[defaults]
inventory          = inventory/tailscale.yaml
remote_user        = root
# 新节点首次连接不验证 host key
host_key_checking  = False
timeout            = 30
# 并发 20 台，100 台节点分 5 批
forks              = 20
stdout_callback    = yaml
interpreter_python = auto_silent

[ssh_connection]
ssh_args           = -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
# 减少 SSH 握手次数，批量操作提速
pipelining         = True
