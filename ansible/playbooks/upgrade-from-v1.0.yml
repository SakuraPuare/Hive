---
# 将 v1.0.0 镜像节点升级到当前版本
#
# 变更内容:
#   1. sysctl: 覆盖写入（v1.0.0 用 >> 追加，可能有重复条目）
#   2. apt-sources: 配置国内多镜像冗余（tuna/ustc/aliyun + official fallback）
#
# 用法:
#   cd ansible
#   ansible-playbook playbooks/upgrade-from-v1.0.yml
#   ansible-playbook playbooks/upgrade-from-v1.0.yml --tags sysctl
#   ansible-playbook playbooks/upgrade-from-v1.0.yml --tags apt-sources
#   ansible-playbook playbooks/upgrade-from-v1.0.yml --limit hive-a1b2c3

- name: Upgrade hive nodes from v1.0.0
  hosts: tag_hive
  gather_facts: true

  tasks:
    # ── sysctl: 网络调优 ──────────────────────────
    - name: Deploy sysctl network tuning
      tags: sysctl
      ansible.builtin.copy:
        dest: /etc/sysctl.d/99-hive.conf
        mode: "0644"
        content: |
          # IP 转发（代理节点必须）
          net.ipv4.ip_forward = 1
          net.ipv6.conf.all.forwarding = 1

          # 网络缓冲区（提升代理吞吐）
          net.core.rmem_max = 67108864
          net.core.wmem_max = 67108864
          net.core.rmem_default = 1048576
          net.core.wmem_default = 1048576

          # TCP 性能
          net.ipv4.tcp_fastopen = 3
          net.ipv4.tcp_congestion_control = bbr
      notify: reload sysctl

    - name: Deploy sysctl security hardening
      tags: sysctl
      ansible.builtin.copy:
        dest: /etc/sysctl.d/99-hive-security.conf
        mode: "0644"
        content: |
          # 防 SYN flood
          net.ipv4.tcp_syncookies = 1

          # 防 IP 欺骗（反向路径过滤）
          net.ipv4.conf.all.rp_filter = 1
          net.ipv4.conf.default.rp_filter = 1

          # 禁止 ICMP 重定向
          net.ipv4.conf.all.accept_redirects = 0
          net.ipv4.conf.default.accept_redirects = 0
          net.ipv6.conf.all.accept_redirects = 0
          net.ipv4.conf.all.send_redirects = 0
          net.ipv4.conf.default.send_redirects = 0

          # 禁止源路由
          net.ipv4.conf.all.accept_source_route = 0
          net.ipv4.conf.default.accept_source_route = 0

          # 忽略伪造 ICMP 错误
          net.ipv4.icmp_ignore_bogus_error_responses = 1

          # 记录异常包（Martian packets）
          net.ipv4.conf.all.log_martians = 1
          net.ipv4.conf.default.log_martians = 1

          # ASLR（地址空间随机化）
          kernel.randomize_va_space = 2
      notify: reload sysctl

    # ── apt: 多镜像源冗余 ────────────────────────
    - name: Deploy multi-mirror apt sources (debian)
      tags: apt-sources
      ansible.builtin.shell: |
        f=/etc/apt/sources.list.d/debian.sources
        [ -f "$f" ] || exit 0
        sed -i '/security/!s|^URIs:.*debian.*|URIs: http://mirrors.tuna.tsinghua.edu.cn/debian http://mirrors.ustc.edu.cn/debian http://mirrors.aliyun.com/debian http://deb.debian.org/debian|' "$f"
        sed -i 's|^URIs:.*security.*|URIs: http://mirrors.tuna.tsinghua.edu.cn/debian-security http://mirrors.ustc.edu.cn/debian-security http://security.debian.org/|' "$f"
      changed_when: true
      when: ansible_distribution == "Debian"

    - name: Deploy multi-mirror apt sources (armbian)
      tags: apt-sources
      ansible.builtin.shell: |
        f=/etc/apt/sources.list.d/armbian.sources
        [ -f "$f" ] || exit 0
        sed -i 's|^URIs:.*|URIs: http://mirrors.tuna.tsinghua.edu.cn/armbian http://mirrors.ustc.edu.cn/armbian http://apt.armbian.com|' "$f"
      changed_when: true
      failed_when: false

  handlers:
    - name: reload sysctl
      ansible.builtin.command: sysctl --system
