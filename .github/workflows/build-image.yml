name: Build Image

on:
  release:
    types: [published]  # 发布新版本时编译全部三块板
  workflow_dispatch:     # 手动触发（Actions 页 "Run workflow" 按钮）
    inputs:
      board:
        description: "手动构建的板子（release 触发时忽略此项，仍编全部三块）"
        type: choice
        default: nanopi-zero2
        options:
          - nanopi-zero2
          - nanopi-r3s
          - orangepi4-lts
          - all   # 手动也想三块全编时选 all

jobs:
  # ── 决定 matrix：release 或手动选 all → 三块；手动选单块 → 只编那块 ──────
  setup:
    runs-on: develop
    outputs:
      profiles: ${{ steps.pick.outputs.profiles }}
    steps:
      - name: Pick profiles
        id: pick
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] \
             && [ "${{ inputs.board }}" != "all" ]; then
            profiles='["${{ inputs.board }}"]'
          else
            profiles='["nanopi-zero2","nanopi-r3s","orangepi4-lts"]'
          fi
          echo "profiles=${profiles}" >> "$GITHUB_OUTPUT"
          echo "本次构建板子: ${profiles}"

  build:
    needs: setup
    runs-on: develop   # self-hosted Gitea act_runner (host mode) on PVE .3
    timeout-minutes: 360  # Armbian 首次构建最长约 90 分钟
    strategy:
      fail-fast: false
      matrix:
        profile: ${{ fromJSON(needs.setup.outputs.profiles) }}

    steps:
      # 持久 runner：保留 gitignore 的 armbian-build/（框架+ccache+已下载二进制）
      # 跨 run 复用。默认 clean=true 会 git clean -ffdx 把它们全删、每次重头来，
      # 那正是下面不再需要 actions/cache 还原 ccache 的原因。
      - uses: actions/checkout@v4
        with:
          clean: false

      # ── 构建依赖 ─────────────────────────────────────────────────────────
      # qemu-user-static is a real package on Ubuntu ≤25.04 but a VIRTUAL one on
      # 25.10/26.04 (provided by qemu-user-binfmt). Install whichever exists so
      # this works on both GitHub-hosted runners and the self-hosted 26.04 VM.
      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          if apt-cache show qemu-user-static 2>/dev/null | grep -q '^Filename:'; then
            QEMU_PKG=qemu-user-static
          else
            QEMU_PKG=qemu-user-binfmt
          fi
          echo "Using qemu package: $QEMU_PKG"
          sudo apt-get install -y \
            git curl wget jq \
            build-essential python3 \
            ccache unzip zip \
            "$QEMU_PKG" binfmt-support \
            debootstrap

      # ── Armbian 框架 ─────────────────────────────────────────────────────
      - name: Setup Armbian framework
        run: ./scripts/setup-armbian.sh

      # ── 下载 arm64 二进制 ────────────────────────────────────────────────
      - name: Download binaries
        run: ./scripts/download-binaries.sh

      # ── 从 secrets 生成 .env ─────────────────────────────────────────────
      - name: Create .env
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_DOMAIN: ${{ secrets.CF_DOMAIN }}
          TAILSCALE_OAUTH_SECRET: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          EASYTIER_NETWORK_NAME: ${{ secrets.EASYTIER_NETWORK_NAME }}
          EASYTIER_SECRET: ${{ secrets.EASYTIER_SECRET }}
          EASYTIER_PEERS: ${{ secrets.EASYTIER_PEERS }}
          FRP_SERVER_ADDR: ${{ secrets.FRP_SERVER_ADDR }}
          FRP_SERVER_PORT: ${{ secrets.FRP_SERVER_PORT }}
          FRP_AUTH_TOKEN: ${{ secrets.FRP_AUTH_TOKEN }}
          DEFAULT_ROOT_PASSWORD: ${{ secrets.DEFAULT_ROOT_PASSWORD }}
          NODE_REGISTRY_URL: ${{ secrets.NODE_REGISTRY_URL }}
          REGISTRY_API_SECRET: ${{ secrets.REGISTRY_API_SECRET }}
          CAMOUFLAGE_URL: ${{ secrets.CAMOUFLAGE_URL }}
        run: |
          printf 'CF_API_TOKEN=%s\n'            "$CF_API_TOKEN"            > .env
          printf 'CF_ACCOUNT_ID=%s\n'           "$CF_ACCOUNT_ID"           >> .env
          printf 'CF_ZONE_ID=%s\n'              "$CF_ZONE_ID"              >> .env
          printf 'CF_DOMAIN=%s\n'               "$CF_DOMAIN"               >> .env
          printf 'TAILSCALE_OAUTH_SECRET=%s\n'  "$TAILSCALE_OAUTH_SECRET"  >> .env
          printf 'EASYTIER_NETWORK_NAME=%s\n'   "$EASYTIER_NETWORK_NAME"   >> .env
          printf 'EASYTIER_SECRET=%s\n'         "$EASYTIER_SECRET"         >> .env
          printf 'EASYTIER_PEERS=%s\n'          "$EASYTIER_PEERS"          >> .env
          printf 'FRP_SERVER_ADDR=%s\n'         "$FRP_SERVER_ADDR"         >> .env
          printf 'FRP_SERVER_PORT=%s\n'         "$FRP_SERVER_PORT"         >> .env
          printf 'FRP_AUTH_TOKEN=%s\n'          "$FRP_AUTH_TOKEN"          >> .env
          printf 'DEFAULT_ROOT_PASSWORD=%s\n'   "$DEFAULT_ROOT_PASSWORD"   >> .env
          printf 'NODE_REGISTRY_URL=%s\n'       "$NODE_REGISTRY_URL"       >> .env
          printf 'REGISTRY_API_SECRET=%s\n'     "$REGISTRY_API_SECRET"     >> .env
          printf 'CAMOUFLAGE_URL=%s\n'          "$CAMOUFLAGE_URL"          >> .env

      # ── 按时间决定档位（避免半夜扰民）────────────────────────────────────
      # UTC+8 20:00–10:00 → 静音档（限核 + 低优先级，风扇基本不起）
      # 其余时段（白天 10:00–20:00）→ 全速档（满核，build.sh 自适应=核数）
      # 注意：判断只在构建「开始」那一刻做一次；单块编译最长约 90 分钟，
      # 跨过窗口边界不会中途变速（renice 运行中的进程脆弱，不做）。
      - name: Decide build speed
        id: speed
        run: |
          utc_h=$((10#$(date -u +%H)))
          hour=$(( (utc_h + 8) % 24 ))      # 换算到 UTC+8
          if [ "$hour" -ge 20 ] || [ "$hour" -lt 10 ]; then
            echo "mode=quiet" >> "$GITHUB_OUTPUT"
            echo "🌙 UTC+8 ${hour} 时 → 静音档（MAKE_JOBS=22 + nice 15）"
          else
            echo "mode=full" >> "$GITHUB_OUTPUT"
            echo "☀️ UTC+8 ${hour} 时 → 全速档（满核）"
          fi

      # ── 构建镜像 ─────────────────────────────────────────────────────────
      - name: Build image
        run: |
          if [ "${{ steps.speed.outputs.mode }}" = "quiet" ]; then
            nice -n 15 env MAKE_JOBS=22 \
              ./scripts/build.sh ${{ matrix.profile }} NO_HOST_RELEASE_CHECK=yes EXPERT=yes
          else
            ./scripts/build.sh ${{ matrix.profile }} NO_HOST_RELEASE_CHECK=yes EXPERT=yes
          fi

      # ── 定位产物 ──────────────────────────────────────────────────────────
      - name: Locate output image
        id: image
        run: |
          echo "=== output/images 目录内容 ==="
          ls -lh armbian-build/build/output/images/ 2>/dev/null || echo "(空目录)"
          # 按优先级匹配：xz > zst > gz > 未压缩 img
          path=$(ls armbian-build/build/output/images/*.img.xz \
                    armbian-build/build/output/images/*.img.zst \
                    armbian-build/build/output/images/*.img.gz \
                    armbian-build/build/output/images/*.img \
                 2>/dev/null | head -1)
          if [ -z "$path" ]; then
            echo "ERROR: 未找到任何 .img* 文件" >&2
            exit 1
          fi
          echo "找到镜像: $path"
          echo "path=${path}"        >> $GITHUB_OUTPUT
          echo "name=$(basename "$path")" >> $GITHUB_OUTPUT

      # ── workflow_dispatch 手动触发：上传为 Artifact ──────────────────────
      - name: Upload artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.profile }}-${{ steps.image.outputs.name }}
          path: ${{ steps.image.outputs.path }}

      # ── release 触发：附加到对应的 GitHub Release ────────────────────────
      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.image.outputs.path }}
