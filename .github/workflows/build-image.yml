name: Build Image

on:
  release:
    types: [published]  # 发布新版本时编译全部三块板
  workflow_dispatch:     # 手动触发（Actions 页 "Run workflow" 按钮）
    inputs:
      board:
        description: "手动构建的板子（release 触发时忽略此项，仍编全部三块）"
        type: choice
        default: nanopi-zero2
        options:
          - nanopi-zero2
          - nanopi-r3s
          - orangepi4-lts
          - all   # 手动也想三块全编时选 all

jobs:
  build:
    runs-on: develop   # self-hosted Gitea act_runner (host mode) on PVE .3
    timeout-minutes: 360  # Armbian 首次构建最长约 90 分钟
    strategy:
      fail-fast: false
      matrix:
        profile: [nanopi-zero2, nanopi-r3s, orangepi4-lts]
    # release 触发 → 三块全编；手动触发 → 只编选中的那块（选 all 则三块）。
    # 用静态 matrix（不用 fromJSON 动态 matrix——Gitea act_runner 对
    # fromJSON(needs.*.outputs.*) 有 bug：matrix 维度生成了但 matrix.profile 绑成
    # 空值，build.sh 收到空 profile 报错，run #8 已踩过并回退）。
    #
    # 板子选择不能放 job 级 if：GitHub 的 job 级 if 禁止引用 matrix 上下文
    # （报 "Unrecognized named-value: 'matrix'"，使整个 workflow 文件 Invalid——
    # 这正是 GitHub 侧 build-image 一直红叉的真因）。Gitea 宽松接受，GitHub 严格拒绝。
    # 故 job 级 if 只放「平台门控」（不含 matrix，两边都合法），板子选择下沉到下面的
    # gate step（step 级表达式里 matrix 可用）。
    #
    # 平台门控（github.server_url != github.com → 仅 Gitea 跑）：本仓库 Gitea 为主、
    # push-mirror 到 GitHub，两边同一份文件。镜像构建依赖自托管 `develop` runner +
    # Gitea 旧版 artifact API，GitHub 上既无该 runner 也跑不了。门控后 GitHub 上整个
    # job skipped，红叉消失；Gitea 行为不变。
    if: github.server_url != 'https://github.com'

    steps:
      - uses: actions/checkout@v4

      # ── 板子选择 gate（替代 job 级 if 里的 matrix 判据，见上方说明）──────────
      # release 或 dispatch+all → 全编；dispatch+单块 → 只有选中那块 build=true。
      # 非选中的 matrix 分支：build=false，后续实质 step 全部 if 跳过（job 秒过）。
      - name: Gate — 本 profile 是否需要构建
        id: gate
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] \
             && [ "${{ github.event.inputs.board }}" != "all" ] \
             && [ "${{ github.event.inputs.board }}" != "${{ matrix.profile }}" ]; then
            echo "build=false" >> "$GITHUB_OUTPUT"
            echo "⏭ ${{ matrix.profile }} 非本次手动选中（board=${{ github.event.inputs.board }}），跳过"
          else
            echo "build=true" >> "$GITHUB_OUTPUT"
            echo "▶ ${{ matrix.profile }} 需要构建"
          fi

      # ── 构建依赖 ─────────────────────────────────────────────────────────
      # qemu-user-static is a real package on Ubuntu ≤25.04 but a VIRTUAL one on
      # 25.10/26.04 (provided by qemu-user-binfmt). Install whichever exists so
      # this works on both GitHub-hosted runners and the self-hosted 26.04 VM.
      - name: Install build dependencies
        if: steps.gate.outputs.build == 'true'
        run: |
          sudo apt-get update -q
          if apt-cache show qemu-user-static 2>/dev/null | grep -q '^Filename:'; then
            QEMU_PKG=qemu-user-static
          else
            QEMU_PKG=qemu-user-binfmt
          fi
          echo "Using qemu package: $QEMU_PKG"
          sudo apt-get install -y \
            git curl wget jq \
            build-essential python3 \
            ccache unzip zip \
            "$QEMU_PKG" binfmt-support \
            debootstrap

      # ── Armbian 框架 ─────────────────────────────────────────────────────
      - name: Setup Armbian framework
        if: steps.gate.outputs.build == 'true'
        run: ./scripts/setup-armbian.sh

      # ── 持久 ccache：软链到工作目录外的固定目录 ──────────────────────────
      # act_runner 每个 run 用全新哈希的 hostexecutor 工作目录（实测 run9≠run10），
      # 所以 workspace 内的 ccache 每次全冷（实测 run #10 ccache=0G、冷编 66min）。
      # 把框架的 build/cache 软链到 $HOME/armbian-persist-cache，让 ccache/toolchain/
      # sources 跨 run 真正留存。必须在 setup-armbian（git clone）之后建，否则
      # clone 目标目录非空会失败。纯文件系统层，不依赖 Armbian 任何变量。
      - name: Link persistent build cache
        if: steps.gate.outputs.build == 'true'
        run: |
          PERSIST="$HOME/armbian-persist-cache"
          mkdir -p "$PERSIST"
          rm -rf armbian-build/build/cache
          ln -sfn "$PERSIST" armbian-build/build/cache
          echo "ccache 等持久缓存 → $PERSIST"
          du -sh "$PERSIST" 2>/dev/null || true

      # ── 下载 arm64 二进制 ────────────────────────────────────────────────
      - name: Download binaries
        if: steps.gate.outputs.build == 'true'
        run: ./scripts/download-binaries.sh

      # ── 从 secrets 生成 .env ─────────────────────────────────────────────
      - name: Create .env
        if: steps.gate.outputs.build == 'true'
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_DOMAIN: ${{ secrets.CF_DOMAIN }}
          TAILSCALE_OAUTH_SECRET: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          EASYTIER_NETWORK_NAME: ${{ secrets.EASYTIER_NETWORK_NAME }}
          EASYTIER_SECRET: ${{ secrets.EASYTIER_SECRET }}
          EASYTIER_PEERS: ${{ secrets.EASYTIER_PEERS }}
          FRP_SERVER_ADDR: ${{ secrets.FRP_SERVER_ADDR }}
          FRP_SERVER_PORT: ${{ secrets.FRP_SERVER_PORT }}
          FRP_AUTH_TOKEN: ${{ secrets.FRP_AUTH_TOKEN }}
          DEFAULT_ROOT_PASSWORD: ${{ secrets.DEFAULT_ROOT_PASSWORD }}
          NODE_REGISTRY_URL: ${{ secrets.NODE_REGISTRY_URL }}
          REGISTRY_API_SECRET: ${{ secrets.REGISTRY_API_SECRET }}
          CAMOUFLAGE_URL: ${{ secrets.CAMOUFLAGE_URL }}
        run: |
          printf 'CF_API_TOKEN=%s\n'            "$CF_API_TOKEN"            > .env
          printf 'CF_ACCOUNT_ID=%s\n'           "$CF_ACCOUNT_ID"           >> .env
          printf 'CF_ZONE_ID=%s\n'              "$CF_ZONE_ID"              >> .env
          printf 'CF_DOMAIN=%s\n'               "$CF_DOMAIN"               >> .env
          printf 'TAILSCALE_OAUTH_SECRET=%s\n'  "$TAILSCALE_OAUTH_SECRET"  >> .env
          printf 'EASYTIER_NETWORK_NAME=%s\n'   "$EASYTIER_NETWORK_NAME"   >> .env
          printf 'EASYTIER_SECRET=%s\n'         "$EASYTIER_SECRET"         >> .env
          printf 'EASYTIER_PEERS=%s\n'          "$EASYTIER_PEERS"          >> .env
          printf 'FRP_SERVER_ADDR=%s\n'         "$FRP_SERVER_ADDR"         >> .env
          printf 'FRP_SERVER_PORT=%s\n'         "$FRP_SERVER_PORT"         >> .env
          printf 'FRP_AUTH_TOKEN=%s\n'          "$FRP_AUTH_TOKEN"          >> .env
          printf 'DEFAULT_ROOT_PASSWORD=%s\n'   "$DEFAULT_ROOT_PASSWORD"   >> .env
          printf 'NODE_REGISTRY_URL=%s\n'       "$NODE_REGISTRY_URL"       >> .env
          printf 'REGISTRY_API_SECRET=%s\n'     "$REGISTRY_API_SECRET"     >> .env
          printf 'CAMOUFLAGE_URL=%s\n'          "$CAMOUFLAGE_URL"          >> .env

      # ── 按时间决定档位 ───────────────────────────────────────────────────
      # UTC+8 20:00–10:00 → 夜间档：只加 nice 15（调度礼让，VM 上有别的活时自动让路）。
      # 实测大核机满核「不超订」即安静不发热（见 build.sh 注释），夜间限核 22 当初
      # 是为降噪——但实测 22 核与满核噪音相同，限核只白白拖慢夜间构建，故去掉限核，
      # 夜间也走 build.sh 的 nproc 自适应（与白天满速档同核数，现 64，升核自动跟）。
      # 其余时段（白天 10:00–20:00）→ 全速档（满核，build.sh 自适应=nproc）。
      # 注意：判断只在构建「开始」那一刻做一次；单块编译最长约 90 分钟，
      # 跨过窗口边界不会中途变速（renice 运行中的进程脆弱，不做）。
      - name: Decide build speed
        id: speed
        if: steps.gate.outputs.build == 'true'
        run: |
          utc_h=$((10#$(date -u +%H)))
          hour=$(( (utc_h + 8) % 24 ))      # 换算到 UTC+8
          if [ "$hour" -ge 20 ] || [ "$hour" -lt 10 ]; then
            echo "mode=quiet" >> "$GITHUB_OUTPUT"
            echo "🌙 UTC+8 ${hour} 时 → 夜间档（满核 + nice 15，与白天同核数）"
          else
            echo "mode=full" >> "$GITHUB_OUTPUT"
            echo "☀️ UTC+8 ${hour} 时 → 全速档（满核）"
          fi

      # ── 构建镜像 ─────────────────────────────────────────────────────────
      - name: Build image
        if: steps.gate.outputs.build == 'true'
        run: |
          if [ "${{ steps.speed.outputs.mode }}" = "quiet" ]; then
            nice -n 15 \
              ./scripts/build.sh ${{ matrix.profile }} NO_HOST_RELEASE_CHECK=yes EXPERT=yes
          else
            ./scripts/build.sh ${{ matrix.profile }} NO_HOST_RELEASE_CHECK=yes EXPERT=yes
          fi

      # ── 定位产物 ──────────────────────────────────────────────────────────
      - name: Locate output image
        id: image
        if: steps.gate.outputs.build == 'true'
        run: |
          echo "=== output/images 目录内容 ==="
          ls -lh armbian-build/build/output/images/ 2>/dev/null || echo "(空目录)"
          # 按优先级匹配：xz > zst > gz > 未压缩 img
          # 注意：多个 glob 里只要有一个不匹配，ls 就返回非零退出码，配合 Gitea 的
          # `bash -e -o pipefail` 会误判整步失败（镜像其实已生成）。故逐个扩展名探测、
          # 命中即停，全程不让非零退出码逃逸到 set -e。
          path=""
          for ext in img.xz img.zst img.gz img; do
            for f in armbian-build/build/output/images/*.${ext}; do
              [ -e "$f" ] && { path="$f"; break; }
            done
            [ -n "$path" ] && break
          done
          if [ -z "$path" ]; then
            echo "ERROR: 未找到任何 .img* 文件" >&2
            exit 1
          fi
          echo "找到镜像: $path"
          echo "path=${path}"        >> $GITHUB_OUTPUT
          echo "name=$(basename "$path")" >> $GITHUB_OUTPUT

      # ── workflow_dispatch 手动触发：上传为 Artifact ──────────────────────
      # Gitea Actions 自报为 GHES，upload-artifact@v4 走新 artifact API（GHES/Gitea 不支持，
      # 报 "v2.0.0+ ... not currently supported on GHES" 而失败）。Gitea 实现的是旧版
      # artifact API，必须用 @v3。GitHub 上 v3 同样可用。
      - name: Upload artifact
        if: steps.gate.outputs.build == 'true' && github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v3
        with:
          name: ${{ matrix.profile }}-${{ steps.image.outputs.name }}
          path: ${{ steps.image.outputs.path }}

      # ── release 触发：附加到对应的 GitHub Release ────────────────────────
      - name: Upload to release
        if: steps.gate.outputs.build == 'true' && github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.image.outputs.path }}

      # ── 收尾：把工作目录交还 dev，让 act_runner 能清理回收 ────────────────
      # Armbian 用 sudo 构建，留下大量 root 拥有的文件；act_runner 以 dev 用户
      # 清理时删不掉 → job 报错且工作目录孤立堆积（实测堆到 71G、撑爆磁盘）。
      # 收尾 chown 回 dev，让 act 的清理成功。always() 确保失败时也跑。
      # 注意：持久 ccache 已软链到 workspace 外，不在 chown/清理范围内，不受影响。
      - name: Reclaim workspace ownership
        if: always()
        run: |
          sudo chown -R dev:dev "$GITHUB_WORKSPACE" 2>/dev/null || true
          echo "工作区已交还 dev，act_runner 可正常回收"
