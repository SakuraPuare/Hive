name: Registry CI/CD

on:
  push:
    branches: [main]
    paths:
      - "management/registry/**"
      - "management/registry-ui/**"
      - ".github/workflows/registry-cicd.yml"
  pull_request:
    paths:
      - "management/registry/**"
      - "management/registry-ui/**"
      - ".github/workflows/registry-cicd.yml"
  workflow_dispatch:

defaults:
  run:
    working-directory: management/registry

jobs:
  # ── CI：代码检查 & 构建验证 ───────────────────────────────────
  ci-go:
    name: CI (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: management/registry/go.mod
          cache-dependency-path: management/registry/go.sum

      - name: go vet
        run: go vet ./...

      - name: Build (amd64)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o /dev/null .

      - name: Build (arm64)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o /dev/null .

      - name: Generate OpenAPI (Go -> swagger/openapi)
        run: make openapi

      - name: Upload openapi.yaml
        uses: actions/upload-artifact@v4
        with:
          name: registry-openapi-${{ github.sha }}
          path: management/registry/openapi/openapi.yaml
          if-no-files-found: error

  ci-frontend:
    name: CI (Frontend) Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    needs: [ci-go]
    defaults:
      run:
        working-directory: management/registry-ui
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: management/registry-ui/package-lock.json

      - name: Download openapi.yaml
        uses: actions/download-artifact@v4
        with:
          name: registry-openapi-${{ github.sha }}
          path: management/registry/openapi

      - name: Install registry-ui deps
        run: npm ci

      - name: Generate TS client + Zod
        run: npm run gen-api

      - name: Run tests
        run: npm test

      - name: Next.js build (static export)
        run: npm run build

      - name: Upload registry-ui out (frontend artifact)
        uses: actions/upload-artifact@v4
        with:
          name: registry-ui-out-${{ github.sha }}-node${{ matrix.node-version }}
          path: management/registry-ui/out
          if-no-files-found: error

  # ── CD：编译产物 & 部署（仅 main 分支）──────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [ci-go, ci-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: management/registry/go.mod
          cache-dependency-path: management/registry/go.sum

      - name: Build amd64
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o hive-registry-amd64 .

      - name: Build arm64
        run: CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o hive-registry-arm64 .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hive-registry-${{ github.sha }}
          path: |
            management/registry/hive-registry-amd64
            management/registry/hive-registry-arm64
