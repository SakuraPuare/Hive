name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "package.json"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch:

jobs:
  # ── Cloudflare Pages ─────────────────────────────────────────
  # 仅 GitHub 跑：文档部署是轻量活，丢给 GitHub 免费 runner，让本地自托管 develop
  # runner（capacity=1）专心干镜像构建重活、不被占用排队。CF Pages 只依赖 CF token，
  # 与平台无关，放 GitHub 即可。
  deploy-cloudflare:
    name: Cloudflare Pages
    runs-on: ubuntu-latest
    if: github.server_url == 'https://github.com'
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build docs
        run: npm run docs:build
        # base 默认 /，CF Pages 使用自定义域名无需子路径

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy docs/.vitepress/dist --project-name "$DOCS_PROJECT_NAME"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          DOCS_PROJECT_NAME: ${{ vars.DOCS_PROJECT_NAME || 'hive-docs' }}

  # ── GitHub Pages ─────────────────────────────────────────────
  # 仅 GitHub 跑：configure-pages / upload-pages-artifact / deploy-pages 是 GitHub
  # 专有 action，在 Gitea 上必失败（之前 Gitea 侧每次都红一个 GitHub Pages job）。
  # 门控到只在 GitHub 一侧后，Gitea 上此 job 直接 skipped。
  deploy-github:
    name: GitHub Pages
    runs-on: ubuntu-latest
    if: github.server_url == 'https://github.com'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v4
        id: pages
        with:
          enablement: true

      - run: npm ci

      - name: Build docs
        run: npm run docs:build
        env:
          VITE_BASE: ${{ steps.pages.outputs.base_path }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        id: deployment
