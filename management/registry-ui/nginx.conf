# registry-ui nginx — serves the Next.js static export only.
# API (/api), Grafana, Prometheus are routed by the cluster Ingress, NOT here.
server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # gzip for static assets
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Next.js static export: try file, dir, .html, then SPA fallback
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # immutable hashed assets
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
