# registry-ui nginx — serves the Next.js static export AND reverse-proxies the
# registry API under /api. Single hostname (hive.sakurapuare.com) is published
# via Cloudflare Tunnel pointing at this Service; the tunnel controller does no
# path rewriting, so the /api prefix strip happens here (like the original VPS
# single-nginx layout).
server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # k8s DNS resolver so the upstream Service name resolves at request time
    resolver kube-dns.kube-system.svc.cluster.local valid=30s;

    # Cloudflare Tunnel re-origins HTTPS as plain HTTP ($scheme=http), so any
    # absolute redirect nginx builds would downgrade the browser to http://.
    # Emit relative Location headers instead — the browser keeps its scheme.
    absolute_redirect off;
    port_in_redirect off;

    # gzip for static assets
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # ── Node Registry API ─────────────────────────────────────────────────
    # /api/health -> registry /health. NOTE: with a variable upstream, nginx
    # does NOT auto-strip the location prefix, and a URI on proxy_pass would be
    # sent literally — so strip /api with an explicit rewrite and use a
    # URI-less proxy_pass (which then forwards the rewritten $uri).
    location = /api { return 301 /api/; }
    location /api/ {
        set $hive_registry hive-registry.hive.svc.cluster.local:8080;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass         http://$hive_registry;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Public entry is Cloudflare Tunnel, which always fronts an HTTPS
        # browser connection but re-origins to this nginx over plain HTTP
        # ($scheme=http). Hardcode https so the backend's isSecureRequest()
        # is true and the admin session cookie is emitted with Secure.
        proxy_set_header   X-Forwarded-Proto https;
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # ── Next.js static export: try file, .html, then dir, then SPA fallback ──
    # IMPORTANT: $uri.html must come BEFORE $uri/. The export emits both a
    # `nodes.html` file and a `nodes/` dir (holding `detail.html` but no
    # index.html). If $uri/ won the match, /nodes would 301 to /nodes/ and then
    # 403 (no index, autoindex off). Trying .html first serves nodes.html 200.
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    # immutable hashed assets
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
