# Hive Registry UI — in-cluster nginx config.
# Serves the Next.js static export and reverse-proxies /api/ to the
# hive-registry Service. The Go router has no /api prefix, so nginx strips
# it (proxy_pass with trailing / ): GET /api/nodes -> registry GET /nodes.
server {
    listen 80;
    server_name _;

    # ── Node Registry API ──────────────────────────────────────────────
    location = /api {
        return 301 $scheme://$host/api/;
    }
    location /api/ {
        proxy_pass http://hive-registry:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # ── Registry UI (Next.js static export) ────────────────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ $uri.html /index.html;
    }
}
