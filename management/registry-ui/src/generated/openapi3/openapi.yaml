                $ref: "#/components/schemas/main.ErrorResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
      summary: Get node by MAC
      tags:
        - nodes
    patch:
      operationId: NodeUpdate
      parameters:
        - description: node mac (12 hex, no colon)
          in: path
          name: mac
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/main.UpdateRequest"
        description: node update payload
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.StatusResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
      summary: Update node (partial)
      tags:
        - nodes
