openapi: 3.0.0
info:
  contact: {}
  description: Hive management plane API for nodes and subscriptions.
  title: Hive Node Registry API
  version: 0.1.0
paths:
  /:
    get:
      operationId: Dashboard
      responses:
        "200":
          description: HTML content
          content:
            text/html:
              schema:
                type: string
        "401":
          description: Unauthorized
          content:
            text/html:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
      summary: Dashboard links
      tags:
        - dashboard
  /admin/audit-logs:
    get:
      operationId: AdminAuditLogs
      parameters:
        - description: limit (default 50)
          in: query
          name: limit
          schema:
            type: integer
        - description: offset (default 0)
          in: query
          name: offset
          schema:
            type: integer
        - description: filter by action
          in: query
          name: action
          schema:
            type: string
        - description: filter by username
          in: query
          name: username
          schema:
            type: string
        - description: filter from date (ISO 8601)
          in: query
          name: from
          schema:
            type: string
        - description: filter to date (ISO 8601)
          in: query
          name: to
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/main.AuditLog"
                type: array
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
      summary: List audit logs
      tags:
        - admin
  /admin/customers:
    get:
      description: Paginated list of customers with optional status/email/search filters
      operationId: AdminListCustomers
      parameters:
        - description: Filter by status
          in: query
          name: status
          schema:
            type: string
        - description: Filter by email (partial match)
          in: query
          name: email
          schema:
            type: string
        - description: Search email or nickname
          in: query
          name: search
          schema:
            type: string
        - description: Page number
          in: query
          name: page
          schema:
            type: integer
            default: 1
        - description: Items per page
          in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                properties:
                  items:
                    items:
                      $ref: "#/components/schemas/main.Customer"
                    type: array
                  limit:
                    type: integer
                  page:
                    type: integer
                  total:
                    format: int64
                    type: integer
                type: object
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
      summary: List customers
      tags:
        - admin
    post:
      description: Create a new customer with email, password, and optional nickname
      operationId: AdminCreateCustomer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/main.CreateCustomerRequest"
        description: Customer info
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.Customer"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
      summary: Create customer
      tags:
        - admin
  "/admin/customers/{id}":
    delete:
      description: Permanently delete a customer account
      operationId: AdminDeleteCustomer
      parameters:
        - description: Customer ID
          in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.StatusResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
      summary: Delete customer
      tags:
        - admin
    get:
      description: Get customer details including all subscriptions
      operationId: AdminGetCustomer
      parameters:
        - description: Customer ID
          in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.CustomerDetail"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
      summary: Get customer
      tags:
        - admin
    patch:
      description: Update customer nickname and/or status
      operationId: AdminUpdateCustomer
      parameters:
        - description: Customer ID
          in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/main.UpdateCustomerRequest"
        description: Fields to update
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.StatusResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
      summary: Update customer
      tags:
        - admin
