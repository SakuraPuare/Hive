openapi: 3.0.0
info:
  contact: {}
  description: Hive management plane API for nodes and subscriptions.
  title: Hive Node Registry API
  version: 0.1.0
paths:
  /:
    get:
      operationId: Dashboard
      responses:
        "200":
          description: HTML content
          content:
            text/html:
              schema:
                type: string
        "401":
          description: Unauthorized
          content:
            text/html:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
      summary: Dashboard links
      tags:
        - dashboard
  /admin/audit-logs:
    get:
      operationId: AdminAuditLogs
      parameters:
        - description: limit (default 50)
          in: query
          name: limit
          schema:
            type: integer
        - description: offset (default 0)
          in: query
          name: offset
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/main.AuditLog"
                type: array
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
      summary: List audit logs
      tags:
        - admin
  /admin/login:
    post:
      operationId: AdminLogin
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/main.AdminLoginRequest"
        description: admin login payload
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.StatusResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
      summary: Admin login
      tags:
        - admin
  /admin/logout:
    post:
      operationId: AdminLogout
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.StatusResponse"
      summary: Admin logout
      tags:
        - admin
  /admin/me:
    get:
      operationId: AdminMe
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
      summary: Get current logged-in user info
      tags:
        - admin
  /admin/permissions:
    get:
      operationId: AdminListPermissions
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                items:
                  type: object
                type: array
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
      summary: List all available permissions
      tags:
        - admin
  /admin/roles:
    get:
      operationId: AdminListRoles
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/main.Role"
                type: array
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
      summary: List all roles with their permissions
      tags:
        - admin
  "/admin/roles/{id}/permissions":
    put:
      operationId: AdminSetRolePermissions
      parameters:
        - description: role id
          in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/main.SetPermissionsRequest"
        description: permissions list
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.StatusResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
      summary: Replace role permissions
      tags:
        - admin
  /admin/users:
    get:
      operationId: AdminListUsers
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/main.User"
                type: array
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
      summary: List all users
      tags:
        - admin
    post:
      operationId: AdminCreateUser
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/main.CreateUserRequest"
        description: create user payload
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.StatusResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
      summary: Create a new user
      tags:
        - admin
  "/admin/users/{id}":
    delete:
      operationId: AdminDeleteUser
      parameters:
        - description: user id
          in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.StatusResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
      summary: Delete a user
      tags:
        - admin
  "/admin/users/{id}/password":
    post:
      operationId: AdminChangePassword
      parameters:
        - description: user id
          in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/main.ChangePasswordRequest"
        description: new password
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.StatusResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
      summary: Change user password (superadmin for others, any user for self)
      tags:
        - admin
  "/admin/users/{id}/roles":
    get:
      operationId: AdminGetUserRoles
      parameters:
        - description: user id
          in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                items:
                  type: string
                type: array
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
      summary: Get user roles
      tags:
        - admin
    put:
      operationId: AdminSetUserRoles
      parameters:
        - description: user id
          in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/main.SetRolesRequest"
        description: roles list
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.StatusResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
      summary: Replace user roles
      tags:
        - admin
  /health:
    get:
      operationId: Health
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.StatusResponse"
        "503":
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
      summary: Health check
      tags:
        - health
  /labels:
    get:
      operationId: LabelsPrint
      responses:
        "200":
          description: HTML content
          content:
            text/html:
              schema:
                type: string
        "401":
          description: Unauthorized
          content:
            text/html:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
      summary: Print labels (HTML)
      tags:
        - labels
  /nodes:
    get:
      operationId: NodesList
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/main.Node"
                type: array
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
      summary: List nodes
      tags:
        - nodes
  "/nodes/{mac}":
    delete:
      operationId: NodeDelete
      parameters:
        - description: node mac (12 hex, no colon)
          in: path
          name: mac
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.StatusResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
      summary: Delete node
      tags:
        - nodes
    get:
      operationId: NodeGet
      parameters:
        - description: node mac (12 hex, no colon)
          in: path
          name: mac
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.Node"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
      summary: Get node by MAC
      tags:
        - nodes
    patch:
      operationId: NodeUpdate
      parameters:
        - description: node mac (12 hex, no colon)
          in: path
          name: mac
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/main.UpdateRequest"
        description: node update payload
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.StatusResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
      summary: Update node (partial)
      tags:
        - nodes
  /nodes/register:
    post:
      operationId: NodeRegister
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/main.RegisterRequest"
        description: node register payload
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.NodeRegisterResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
      summary: Register node (idempotent)
      tags:
        - nodes
  /prometheus-targets:
    get:
      operationId: PrometheusTargets
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/main.PrometheusTarget"
                type: array
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
      summary: Prometheus file_sd targets
      tags:
        - prometheus
  /subscription:
    get:
      operationId: SubscriptionVless
      responses:
        "200":
          description: base64 encoded subscription
          content:
            text/plain:
              schema:
                type: string
        "401":
          description: Unauthorized
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
      summary: VLESS subscription (base64)
      tags:
        - subscription
  /subscription/clash:
    get:
      operationId: SubscriptionClash
      responses:
        "200":
          description: clash yaml content
          content:
            text/plain:
              schema:
                type: string
        "401":
          description: Unauthorized
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
      summary: Clash/Mihomo subscription YAML
      tags:
        - subscription
servers:
  - url: /
components:
  securitySchemes:
    AdminSessionCookie:
      description: '"HttpOnly session cookie for admin UI"'
      in: cookie
      name: hive_admin_session
      type: apiKey
    BearerAuth:
      description: '"Authorization: Bearer <API_SECRET>"'
      in: header
      name: Authorization
      type: apiKey
  schemas:
    main.AdminLoginRequest:
      properties:
        password:
          type: string
        username:
          type: string
      type: object
    main.AuditLog:
      properties:
        action:
          type: string
        created_at:
          type: string
        detail:
          type: string
        id:
          type: integer
        ip:
          type: string
        username:
          type: string
      type: object
    main.ChangePasswordRequest:
      properties:
        password:
          type: string
      type: object
    main.CreateUserRequest:
      properties:
        password:
          type: string
        role:
          type: string
        username:
          type: string
      type: object
    main.ErrorResponse:
      properties:
        error:
          type: string
      type: object
    main.Node:
      properties:
        cf_url:
          type: string
        easytier_ip:
          type: string
        frp_port:
          type: integer
        hostname:
          type: string
        last_seen:
          type: string
        location:
          type: string
        mac:
          type: string
        mac6:
          type: string
        note:
          type: string
        registered_at:
          type: string
        tailscale_ip:
          type: string
        tunnel_id:
          type: string
        xray_uuid:
          type: string
      type: object
    main.NodeRegisterResponse:
      properties:
        hostname:
          type: string
        registered_at:
          type: string
        status:
          type: string
      type: object
    main.PrometheusTarget:
      properties:
        labels:
          additionalProperties:
            type: string
          type: object
        targets:
          items:
            type: string
          type: array
      type: object
    main.RegisterRequest:
      properties:
        cf_url:
          type: string
        easytier_ip:
          type: string
        frp_port:
          type: integer
        hostname:
          type: string
        mac:
          type: string
        mac6:
          type: string
        tailscale_ip:
          type: string
        tunnel_id:
          type: string
        xray_uuid:
          type: string
      type: object
    main.Role:
      properties:
        description:
          type: string
        id:
          type: integer
        name:
          type: string
        permissions:
          items:
            type: string
          type: array
      type: object
    main.SetPermissionsRequest:
      properties:
        permissions:
          items:
            type: string
          type: array
      type: object
    main.SetRolesRequest:
      properties:
        roles:
          items:
            type: string
          type: array
      type: object
    main.StatusResponse:
      properties:
        status:
          type: string
      type: object
    main.UpdateRequest:
      properties:
        location:
          type: string
        note:
          type: string
        tailscale_ip:
          type: string
      type: object
    main.User:
      properties:
        created_at:
          type: string
        id:
          type: integer
        role:
          type: string
        updated_at:
          type: string
        username:
          type: string
      type: object
