info:
  contact: {}
  description: Hive management plane API for nodes and subscriptions.
  title: Hive Node Registry API
  version: 0.1.0
paths:
  /:
    get:
      consumes:
      - application/json
      operationId: Dashboard
      produces:
      - text/html
      responses:
        "200":
          description: HTML content
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: Dashboard links
      tags:
      - dashboard
  /admin/audit-logs:
    get:
      operationId: AdminAuditLogs
      parameters:
      - description: limit (default 50)
        in: query
        name: limit
        type: integer
      - description: offset (default 0)
        in: query
        name: offset
        type: integer
      - description: filter by action
        in: query
        name: action
        type: string
      - description: filter by username
        in: query
        name: username
        type: string
      - description: filter from date (ISO 8601)
        in: query
        name: from
        type: string
      - description: filter to date (ISO 8601)
        in: query
        name: to
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/main.AuditLog'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: List audit logs
      tags:
      - admin
  /admin/customers:
    get:
      consumes:
      - application/json
      description: Paginated list of customers with optional status/email/search filters
      operationId: AdminListCustomers
      parameters:
      - description: Filter by status
        in: query
        name: status
        type: string
      - description: Filter by email (partial match)
        in: query
        name: email
        type: string
      - description: Search email or nickname
        in: query
        name: search
        type: string
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Items per page
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              items:
                items:
                  $ref: '#/definitions/main.Customer'
                type: array
              limit:
                type: integer
              page:
                type: integer
              total:
                format: int64
                type: integer
            type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: List customers
      tags:
      - admin
    post:
      consumes:
      - application/json
      description: Create a new customer with email, password, and optional nickname
      operationId: AdminCreateCustomer
      parameters:
      - description: Customer info
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/main.CreateCustomerRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.Customer'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: Create customer
      tags:
      - admin
  /admin/customers/{id}:
    delete:
      description: Permanently delete a customer account
      operationId: AdminDeleteCustomer
      parameters:
      - description: Customer ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.StatusResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: Delete customer
      tags:
      - admin
    get:
      description: Get customer details including all subscriptions
      operationId: AdminGetCustomer
      parameters:
      - description: Customer ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.CustomerDetail'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: Get customer
      tags:
      - admin
    patch:
      consumes:
      - application/json
      description: Update customer nickname and/or status
      operationId: AdminUpdateCustomer
      parameters:
      - description: Customer ID
        in: path
        name: id
        required: true
        type: integer
      - description: Fields to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/main.UpdateCustomerRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.StatusResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: Update customer
      tags:
      - admin
  /admin/customers/{id}/password:
    post:
      consumes:
      - application/json
      description: Set a new password for the customer
      operationId: AdminResetCustomerPassword
      parameters:
      - description: Customer ID
        in: path
        name: id
        required: true
        type: integer
      - description: New password
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/main.ResetCustomerPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.StatusResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: Reset customer password
      tags:
      - admin
  /admin/customers/{id}/subscriptions:
    get:
      description: Get all subscriptions belonging to a customer
      operationId: AdminListSubscriptions
      parameters:
      - description: Customer ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/main.CustomerSubscription'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: List subscriptions
      tags:
      - admin
    post:
      consumes:
      - application/json
      description: Create a new subscription for a customer based on a plan
      operationId: AdminCreateSubscription
      parameters:
      - description: Customer ID
        in: path
        name: id
        required: true
        type: integer
      - description: Subscription info
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/main.CreateSubscriptionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.CustomerSubscription'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: Create subscription
      tags:
      - admin
  /admin/customers/{id}/traffic:
    get:
      description: Per-subscription traffic summary with upload/download totals
      operationId: AdminGetCustomerTraffic
      parameters:
      - description: Customer ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.CustomerTrafficResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: Get customer traffic
      tags:
      - admin
  /admin/lines:
    get:
      operationId: AdminListLines
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/main.Line'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: List all lines
      tags:
      - admin
    post:
      consumes:
      - application/json
      operationId: AdminCreateLine
      parameters:
      - description: Line to create
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/main.CreateLineRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              id:
                type: integer
              token:
                type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: Create a new line
      tags:
      - admin
  /admin/lines/{id}:
    delete:
      operationId: AdminDeleteLine
      parameters:
      - description: Line ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.StatusResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: Delete a line
      tags:
      - admin
    patch:
      consumes:
      - application/json
      operationId: AdminUpdateLine
      parameters:
      - description: Line ID
        in: path
        name: id
        required: true
        type: integer
      - description: Fields to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/main.UpdateLineRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.StatusResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: Update a line
      tags:
      - admin
  /admin/lines/{id}/nodes:
    get:
      operationId: AdminGetLineNodes
      parameters:
      - description: Line ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              type: string
            type: array
        "400":
          description: Bad Request
