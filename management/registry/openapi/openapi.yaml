basePath: /
definitions:
  main.AdminLoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    type: object
  main.AuditLog:
    properties:
      action:
        type: string
      created_at:
        type: string
      detail:
        type: string
      id:
        type: integer
      ip:
        type: string
      username:
        type: string
    type: object
  main.ChangePasswordRequest:
    properties:
      password:
        type: string
    type: object
  main.CreateGroupRequest:
    properties:
      name:
        type: string
    type: object
  main.CreateUserRequest:
    properties:
      password:
        type: string
      role:
        type: string
      username:
        type: string
    type: object
  main.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  main.Node:
    properties:
      cf_url:
        type: string
      easytier_ip:
        type: string
      frp_port:
        type: integer
      hostname:
        type: string
      last_seen:
        type: string
      location:
        type: string
      mac:
        type: string
      mac6:
        type: string
      note:
        type: string
      registered_at:
        type: string
      tailscale_ip:
        type: string
      tunnel_id:
        type: string
      xray_uuid:
        type: string
    type: object
  main.NodeRegisterResponse:
    properties:
      hostname:
        type: string
      registered_at:
        type: string
      status:
        type: string
    type: object
  main.PrometheusTarget:
    properties:
      labels:
        additionalProperties:
          type: string
        type: object
      targets:
        items:
          type: string
        type: array
    type: object
  main.RegisterRequest:
    properties:
      cf_url:
        type: string
      easytier_ip:
        type: string
      frp_port:
        type: integer
      hostname:
        type: string
      mac:
        type: string
      mac6:
        type: string
      tailscale_ip:
        type: string
      tunnel_id:
        type: string
      xray_uuid:
        type: string
    type: object
  main.ResetTokenResponse:
    properties:
      token:
        type: string
    type: object
  main.Role:
    properties:
      description:
        type: string
      id:
        type: integer
      name:
        type: string
      permissions:
        items:
          type: string
        type: array
    type: object
  main.SetGroupNodesRequest:
    properties:
      nodes:
        items:
          type: string
        type: array
    type: object
  main.SetPermissionsRequest:
    properties:
      permissions:
        items:
          type: string
        type: array
    type: object
  main.SetRolesRequest:
    properties:
      roles:
        items:
          type: string
        type: array
    type: object
  main.StatusResponse:
    properties:
      status:
        type: string
    type: object
  main.SubscriptionGroup:
    properties:
      created_at:
        type: string
      id:
        type: integer
      name:
        type: string
      node_count:
        type: integer
      token:
        type: string
      updated_at:
        type: string
    type: object
  main.UpdateRequest:
    properties:
      location:
        type: string
      note:
        type: string
      tailscale_ip:
        type: string
    type: object
  main.User:
    properties:
      created_at:
        type: string
      id:
        type: integer
      role:
        type: string
      updated_at:
        type: string
      username:
        type: string
    type: object
info:
  contact: {}
  description: Hive management plane API for nodes and subscriptions.
  title: Hive Node Registry API
  version: 0.1.0
paths:
  /:
    get:
      consumes:
      - application/json
      operationId: Dashboard
      produces:
      - text/html
      responses:
        "200":
          description: HTML content
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: Dashboard links
      tags:
      - dashboard
  /admin/audit-logs:
    get:
      operationId: AdminAuditLogs
      parameters:
      - description: limit (default 50)
        in: query
        name: limit
        type: integer
      - description: offset (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/main.AuditLog'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: List audit logs
      tags:
      - admin
  /admin/login:
    post:
      consumes:
      - application/json
      operationId: AdminLogin
      parameters:
      - description: admin login payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/main.AdminLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.StatusResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: Admin login
      tags:
      - admin
  /admin/logout:
    post:
      consumes:
      - application/json
      operationId: AdminLogout
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.StatusResponse'
      summary: Admin logout
      tags:
      - admin
  /admin/me:
    get:
      operationId: AdminMe
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.User'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: Get current logged-in user info
      tags:
      - admin
  /admin/permissions:
    get:
      operationId: AdminListPermissions
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              type: object
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: List all available permissions
      tags:
      - admin
  /admin/roles:
    get:
      operationId: AdminListRoles
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/main.Role'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: List all roles with their permissions
      tags:
      - admin
  /admin/roles/{id}/permissions:
    put:
      consumes:
      - application/json
      operationId: AdminSetRolePermissions
      parameters:
      - description: role id
        in: path
        name: id
        required: true
        type: integer
      - description: permissions list
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/main.SetPermissionsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.StatusResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: Replace role permissions
      tags:
      - admin
  /admin/subscription-groups:
    get:
      operationId: AdminListSubscriptionGroups
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/main.SubscriptionGroup'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: List subscription groups
      tags:
      - admin
    post:
      consumes:
      - application/json
      operationId: AdminCreateSubscriptionGroup
      parameters:
      - description: group name
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/main.CreateGroupRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.SubscriptionGroup'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: Create subscription group
      tags:
      - admin
  /admin/subscription-groups/{id}:
    delete:
      operationId: AdminDeleteSubscriptionGroup
      parameters:
      - description: group id
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.StatusResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: Delete subscription group
      tags:
      - admin
  /admin/subscription-groups/{id}/nodes:
    get:
      operationId: AdminGetSubscriptionGroupNodes
      parameters:
      - description: group id
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              type: string
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: List node MACs in a subscription group
      tags:
      - admin
    put:
      consumes:
      - application/json
      operationId: AdminSetSubscriptionGroupNodes
      parameters:
      - description: group id
        in: path
        name: id
        required: true
        type: integer
      - description: node MAC list
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/main.SetGroupNodesRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.StatusResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: Replace node MACs in a subscription group
      tags:
      - admin
  /admin/subscription-groups/{id}/reset-token:
    post:
      operationId: AdminResetSubscriptionGroupToken
      parameters:
      - description: group id
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.ResetTokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: Reset subscription group token
      tags:
      - admin
  /admin/users:
    get:
      operationId: AdminListUsers
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/main.User'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: List all users
      tags:
      - admin
    post:
      consumes:
      - application/json
      operationId: AdminCreateUser
      parameters:
      - description: create user payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/main.CreateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.StatusResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: Create a new user
      tags:
      - admin
  /admin/users/{id}:
    delete:
      operationId: AdminDeleteUser
      parameters:
      - description: user id
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.StatusResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: Delete a user
      tags:
      - admin
  /admin/users/{id}/password:
    post:
      consumes:
      - application/json
      operationId: AdminChangePassword
      parameters:
      - description: user id
        in: path
        name: id
        required: true
        type: integer
      - description: new password
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/main.ChangePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.StatusResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: Change user password (superadmin for others, any user for self)
      tags:
      - admin
  /admin/users/{id}/roles:
    get:
      operationId: AdminGetUserRoles
      parameters:
      - description: user id
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              type: string
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: Get user roles
      tags:
      - admin
    put:
      consumes:
      - application/json
      operationId: AdminSetUserRoles
      parameters:
      - description: user id
        in: path
        name: id
        required: true
        type: integer
      - description: roles list
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/main.SetRolesRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.StatusResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: Replace user roles
      tags:
      - admin
  /health:
    get:
      consumes:
      - application/json
      operationId: Health
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.StatusResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: Health check
      tags:
      - health
  /labels:
    get:
      consumes:
      - application/json
      operationId: LabelsPrint
      produces:
      - text/html
      responses:
        "200":
          description: HTML content
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: Print labels (HTML)
      tags:
      - labels
  /nodes:
    get:
      consumes:
      - application/json
      operationId: NodesList
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/main.Node'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: List nodes
      tags:
      - nodes
  /nodes/{mac}:
    delete:
      consumes:
      - application/json
      operationId: NodeDelete
      parameters:
      - description: node mac (12 hex, no colon)
        in: path
        name: mac
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.StatusResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: Delete node
      tags:
      - nodes
    get:
      consumes:
      - application/json
      operationId: NodeGet
      parameters:
      - description: node mac (12 hex, no colon)
        in: path
        name: mac
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.Node'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: Get node by MAC
      tags:
      - nodes
    patch:
      consumes:
      - application/json
      operationId: NodeUpdate
      parameters:
      - description: node mac (12 hex, no colon)
        in: path
        name: mac
        required: true
        type: string
      - description: node update payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/main.UpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.StatusResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: Update node (partial)
      tags:
      - nodes
  /nodes/register:
    post:
      consumes:
      - application/json
      operationId: NodeRegister
      parameters:
      - description: node register payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/main.RegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.NodeRegisterResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: Register node (idempotent)
      tags:
      - nodes
  /prometheus-targets:
    get:
      consumes:
      - application/json
      operationId: PrometheusTargets
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/main.PrometheusTarget'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: Prometheus file_sd targets
      tags:
      - prometheus
  /subscription:
    get:
      consumes:
      - application/json
      operationId: SubscriptionVless
      produces:
      - text/plain
      responses:
        "200":
          description: base64 encoded subscription
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: VLESS subscription (base64)
      tags:
      - subscription
  /subscription/clash:
    get:
      consumes:
      - application/json
      operationId: SubscriptionClash
      produces:
      - text/plain
      responses:
        "200":
          description: clash yaml content
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: Clash/Mihomo subscription YAML
      tags:
      - subscription
schemes:
- https
- http
securityDefinitions:
  AdminSessionCookie:
    description: '"HttpOnly session cookie for admin UI"'
    in: cookie
    name: hive_admin_session
    type: apiKey
  BearerAuth:
    description: '"Authorization: Bearer <API_SECRET>"'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
