        type: string
      note:
        type: string
      region:
        type: string
    type: object
  main.UpdateOrderStatusRequest:
    properties:
      status:
        type: string
    type: object
  main.UpdatePlanRequest:
    properties:
      device_limit:
        type: integer
      duration_days:
        type: integer
      enabled:
        type: boolean
      name:
        type: string
      price:
        type: integer
